name: perf-gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  benchmark-gates:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: compiler
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: compiler/go.mod

      - name: Run performance gates
        env:
          MAX_CODEGEN_NS: "45000"
          MAX_CODEGEN_ALLOCS: "550"
          MAX_PHYSICS_1000_NS: "9000000"
          MAX_PHYSICS_1000_ALLOCS: "10"
          OUT_DIR: ".perf-results"
        run: bash ./scripts/perf-gate.sh

      - name: Build markdown perf summary
        env:
          OUT_DIR: ".perf-results"
          SUMMARY_FILE: ".perf-results/perf-summary.md"
        run: bash ./scripts/perf-summary.sh

      - name: Publish job summary
        if: always()
        run: |
          if [ -f .perf-results/perf-summary.md ]; then
            cat .perf-results/perf-summary.md >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "Perf summary file missing." >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upsert PR benchmark comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'compiler/.perf-results/perf-summary.md';
            let body = '## Perf Gate Summary\n\nPerf summary file missing.';
            if (fs.existsSync(path)) {
              body = fs.readFileSync(path, 'utf8');
            }
            const marker = '<!-- candy-perf-gate -->';
            const commentBody = `${marker}\n${body}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: commentBody,
              });
            }

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results-${{ github.run_id }}-${{ github.run_attempt }}
          path: compiler/.perf-results/
          if-no-files-found: warn
